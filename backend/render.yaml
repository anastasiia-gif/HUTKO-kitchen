services:
  - type: web
    name: hutko-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: WEBHOOK_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://hutko-kitchen.com
      - key: OWNER_EMAIL
        sync: false
      - key: RENDER_EXTERNAL_URL
        sync: false
      - key: MOLLIE_API_KEY
        sync: false       # get from mollie.com — free account, NL iDEAL support
      - key: TRELLO_API_KEY
        sync: false
      - key: TRELLO_TOKEN
        sync: false
      # DATABASE_URL — leave unset to use SQLite (safe default)
      # Add a Render PostgreSQL database manually when ready to upgrade
