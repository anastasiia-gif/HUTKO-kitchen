services:
  - type: web
    name: hutko-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false       # set manually in Render dashboard
      - key: RESEND_API_KEY
        sync: false       # set manually in Render dashboard
      - key: FRONTEND_URL
        value: https://hutko.netlify.app
